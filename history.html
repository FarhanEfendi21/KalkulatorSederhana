<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Perhitungan - Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <link rel="apple-touch-icon" href="icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Load Error', err));
            });
        }
    </script>

    <style>
        .history-list {
            list-style: none;
            width: 100%;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 1rem;
            padding-right: 0.5rem;
        }

        /* Custom Scrollbar */
        .history-list::-webkit-scrollbar {
            width: 4px;
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .history-list::-webkit-scrollbar-thumb {
            background: var(--op-bg);
            border-radius: 10px;
        }

        .history-item {
            background: var(--button-bg);
            padding: 1.25rem;
            border-radius: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-soft);
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .history-expr {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .history-res {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .clear-btn {
            width: 100%;
            height: 56px;
            margin-top: 1.5rem;
            background: #fef2f2;
            color: #ef4444;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 1.25rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        body.dark-mode .clear-btn {
            background: rgba(239, 68, 68, 0.1);
        }

        .clear-btn:hover {
            background: #fee2e2;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 3rem 0;
            font-size: 0.95rem;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="background-glow"></div>
    <main class="calculator-container">
        <header>
            <div class="header-text">
                <h1>Riwayat</h1>
                <p>Perhitungan terakhir Anda</p>
            </div>
        </header>

        <section class="calculator-glass">
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Kalkulator</a>
            </nav>

            <div id="history-container" class="history-list">
                <!-- History items will be injected here -->
            </div>

            <button id="clear-history" class="clear-btn">Hapus Riwayat</button>
        </section>

        <footer>
            <p>Data disimpan di browser Anda 🌐</p>
        </footer>
    </main>

    <script>
        // Apply theme immediately
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
        }

        const historyContainer = document.getElementById('history-container');
        const clearBtn = document.getElementById('clear-history');

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('calc_history') || '[]');
            historyContainer.innerHTML = '';

            if (history.length === 0) {
                historyContainer.innerHTML = '<div class="empty-state">Belum ada riwayat.<br>Mulai menghitung sekarang!</div>';
                clearBtn.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'block';
            history.reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <span class="history-expr">${item.expression}</span>
                    <span class="history-res">${item.result}</span>
                `;
                historyContainer.appendChild(div);
            });
        }

        clearBtn.addEventListener('click', () => {
            localStorage.removeItem('calc_history');
            loadHistory();
        });

        loadHistory();
    </script>
</body>

</html>
