<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator - Alat Hitung Minimalis</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Calculator">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="shortcut icon" href="icon-512.png">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Load Error', err));
            });
        }
    </script>
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
                    <line x1="8" y1="6" x2="16" y2="6"></line>
                    <line x1="16" y1="14" x2="16" y2="18"></line>
                    <path d="M16 10h.01"></path>
                    <path d="M12 10h.01"></path>
                    <path d="M8 10h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M8 14h.01"></path>
                    <path d="M12 18h.01"></path>
                    <path d="M8 18h.01"></path>
                </svg>
            </div>
            <div class="splash-loader"></div>
        </div>
    </div>

    <div class="background-glow"></div>
    <main class="calculator-container">
        <header>
            <div class="header-text">
                <h1>Kalkulator</h1>
                <p>Alat hitung cerdas untuk produktivitas Anda</p>
            </div>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </header>

        <section class="calculator-glass">
            <nav class="main-nav">
                <a href="history.html" class="nav-link">Riwayat </a>
            </nav>
            <div class="display">
                <div id="previous-operand" class="previous-operand"></div>
                <div id="current-operand" class="current-operand">0</div>
            </div>

            <!-- Advanced Panel (Hidden by default) -->
            <div class="advanced-panel" id="advanced-panel">
                <div class="advanced-buttons">
                    <button data-advanced="2nd" class="control">2<sup>nd</sup></button>
                    <button data-advanced="deg" class="control" id="mode-toggle">deg</button>
                    <button data-advanced="sin" class="control">sin</button>
                    <button data-advanced="cos" class="control">cos</button>
                    <button data-advanced="tan" class="control">tan</button>
                    <button data-advanced="power" class="control">x<sup>y</sup></button>
                    <button data-advanced="lg" class="control">lg</button>
                    <button data-advanced="ln" class="control">ln</button>
                    <button data-advanced="(" class="control">(</button>
                    <button data-advanced=")" class="control">)</button>
                    <button data-advanced="sqrt" class="control">√</button>
                    <button data-advanced="fact" class="control">x!</button>
                    <button data-advanced="inv" class="control">1/x</button>
                    <button data-advanced="phi" class="control">φ</button>
                </div>
            </div>

            <div class="buttons">
                <button data-all-clear class="control">AC</button>
                <button data-delete class="control">DEL</button>
                <button data-operation="%" class="control">%</button>
                <button data-operation="÷" class="operator">÷</button>

                <button data-number>7</button>
                <button data-number>8</button>
                <button data-number>9</button>
                <button data-operation="×" class="operator">×</button>

                <button data-number>4</button>
                <button data-number>5</button>
                <button data-number>6</button>
                <button data-operation="+" class="operator">+</button>

                <button data-number>1</button>
                <button data-number>2</button>
                <button data-number>3</button>
                <button data-operation="−" class="operator">−</button>

                <button id="advanced-toggle" class="control">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="1"></circle>
                        <circle cx="19" cy="12" r="1"></circle>
                        <circle cx="5" cy="12" r="1"></circle>
                    </svg>
                </button>
                <button data-number>0</button>
                <button data-number>.</button>
                <button data-equals class="operator-equal">=</button>
            </div>
        </section>

        <footer>
            <p>Didesain untuk kesederhanaan ⚖️</p>
        </footer>
    </main>
    <script src="script.js"></script>
</body>

</html>
